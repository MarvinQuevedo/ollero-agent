source: "."
destination: "./_site"
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - target
  - src
  - scripts
  - sandbox
  - "*.lock"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

remote_theme: just-the-docs/just-the-docs

title: "Allux Docs"
description: "Local code agent powered by Ollama — written in Rust"
url: "https://marvinquevedo.github.io"
baseurl: "/allux-agent"

# Navigation
nav_sort: case_insensitive
search_enabled: true
search:
  heading_level: 2
  previews: 3

color_scheme: dark

footer_content: "Allux is open-source under GPL-3.0. <a href='https://github.com/MarvinQuevedo/allux-agent'>GitHub →</a>"

# Back to top
back_to_top: true
back_to_top_text: "Back to top"
